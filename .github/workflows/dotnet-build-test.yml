name: .NET Core Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore Biblioteca.sln
    - name: Build
      run: dotnet build Biblioteca.sln --no-restore --configuration Release
    - name: Test
      run: dotnet test Biblioteca.sln --no-build --configuration Release
