name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '24'
  DOCKER_COMPOSE_FILE: 'docker-compose.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # Backend Build and Test
  build-backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [Release]
    
    services:
      mongodb-user:
        image: mongo:latest
        ports:
          - 27017:27017
      mongodb-catalog:
        image: mongo:latest
        ports:
          - 27018:27018
      mongodb-loan:
        image: mongo:latest
        ports:
          - 27019:27019
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore Biblioteca.sln
    
    - name: Build
      run: dotnet build Biblioteca.sln --no-restore --configuration ${{ matrix.configuration }}
    
    - name: Run tests
      run: dotnet test Biblioteca.sln --no-build --configuration ${{ matrix.configuration }}
    
    - name: Run linting
      run: |
        dotnet tool install --global dotnet-format
        dotnet format style Biblioteca.sln --verify-no-changes
    
    - name: Run code analysis
      run: |
        dotnet tool install --global dotnet-reportgenerator-globaltool
        dotnet test Biblioteca.sln --collect:"XPlat Code Coverage" --results-directory ./coverage
        reportgenerator -reports:./coverage/**/*.cobertura.xml -targetdir:./reports -reporttypes:Html
        echo "Code coverage reports generated"
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: backend-coverage-reports
        path: reports/
        retention-days: 7
    
    - name: Upload test results
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: backend-test-results
        path: test-results/
        retention-days: 7

  # Frontend Build and Test
  build-frontend:
    name: Build and Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting
      run: |
        npm run lint
        npm run typecheck
    
    - name: Run tests
      run: |
        npx vitest run --coverage
    
    - name: Build
      run: npm run build
    
    - name: Upload test coverage
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: frontend-coverage
        path: frontend/coverage/
        retention-days: 7
    
    - name: Upload test results
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: frontend-test-results
        path: frontend/test-results/
        retention-days: 7

  # Docker Build and Security Scan
  docker-build:
    name: Docker Build and Security Scan
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build and push backend images
      run: |
        docker buildx build --push \
          --tag yourusername/biblioteca-user-service:latest \
          --platform linux/amd64 \
          ./services/user-service/UserService.Api
    
    - name: Build and push catalog images
      run: |
        docker buildx build --push \
          --tag yourusername/biblioteca-catalog-service:latest \
          --platform linux/amd64 \
          ./services/catalog-service/CatalogService.Api
    
    - name: Build and push loan images
      run: |
        docker buildx build --push \
          --tag yourusername/biblioteca-loan-service:latest \
          --platform linux/amd64 \
          ./services/loan-service/LoanService.Api
    
    - name: Security scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output-format: 'sarif'
        severity: 'HIGH,CRITICAL'
        ignore-unfixed: true
        exit-code: 1
        vuln-type: 'os,library'
        skip-dirs: 'node_modules,.git'
    
    - name: Upload security scan results
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: security-scan-results
        path: trivy-results.sarif
        retention-days: 7

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Deploy to staging environment
      run: |
        echo "Deploying to staging environment"
        # Add your deployment commands here
        # Example: kubectl apply -f k8s/staging/
        # Example: ./deploy.sh staging

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Deploy to production environment
      run: |
        echo "Deploying to production environment"
        # Add your production deployment commands here
        # Example: kubectl apply -f k8s/production/
        # Example: ./deploy.sh production
        # Example: ./up.sh (for local deployment)

  # Code Quality Check
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Check .editorconfig
      run: |
        if [ ! -f .editorconfig ]; then
          echo ".editorconfig not found"
          exit 1
        fi
        echo ".editorconfig exists"
    
    - name: Check .gitignore
      run: |
        if [ ! -f .gitignore ]; then
          echo ".gitignore not found"
          exit 1
        fi
        echo ".gitignore exists"
    
    - name: Check CODEOWNERS
      run: |
        if [ ! -f CODEOWNERS ]; then
          echo "CODEOWNERS not found"
          exit 1
        fi
        echo "CODEOWNERS exists"
