services:
  # ─── MongoDB ──────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: biblioteca-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── UserService ──────────────────────────────────────────
  userservice:
    build:
      context: .
      dockerfile: services/user-service/UserService.Api/Dockerfile
    container_name: biblioteca-userservice
    restart: unless-stopped
    ports:
      - "5146:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      MongoSettings__ConnectionString: "mongodb://root:example@mongodb:27017/UserServiceDb?authSource=admin"
      MongoSettings__DatabaseName: "UserServiceDb"
      Jwt__Key: "ae55eeaac8de877062ba7c878a31873693ae0f0d9bfb6543abe847cc648e67ac"
      Jwt__Issuer: "Biblioteca"
      Jwt__Audience: "BibliotecaServices"
      Jwt__ExpirationMinutes: "60"
    depends_on:
      mongodb:
        condition: service_healthy

  # ─── CatalogService ───────────────────────────────────────
  catalogservice:
    build:
      context: .
      dockerfile: services/catalog-service/CatalogService.Api/Dockerfile
    container_name: biblioteca-catalogservice
    restart: unless-stopped
    ports:
      - "5147:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      MongoSettings__ConnectionString: "mongodb://root:example@mongodb:27017/CatalogServiceDb?authSource=admin"
      MongoSettings__DatabaseName: "CatalogServiceDb"
    depends_on:
      mongodb:
        condition: service_healthy

  # ─── LoanService ──────────────────────────────────────────
  loanservice:
    build:
      context: .
      dockerfile: services/loan-service/LoanService.Api/Dockerfile
    container_name: biblioteca-loanservice
    restart: unless-stopped
    ports:
      - "5118:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      MongoSettings__ConnectionString: "mongodb://root:example@mongodb:27017/LoanServiceDb?authSource=admin"
      MongoSettings__DatabaseName: "LoanServiceDb"
      Jwt__Key: "ae55eeaac8de877062ba7c878a31873693ae0f0d9bfb6543abe847cc648e67ac"
      Jwt__Issuer: "Biblioteca"
      Jwt__Audience: "BibliotecaServices"
      CatalogService__BaseUrl: "http://catalogservice:8080/"
    depends_on:
      mongodb:
        condition: service_healthy
      catalogservice:
        condition: service_started

  # ─── NotificationService ──────────────────────────────────
  notificationservice:
    build:
      context: .
      dockerfile: services/notification-service/NotificationService.Api/Dockerfile
    container_name: biblioteca-notificationservice
    restart: unless-stopped
    ports:
      - "5151:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"

  # ─── Gateway (YARP) ──────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: gateway/Gateway.Api/Dockerfile
    container_name: biblioteca-gateway
    restart: unless-stopped
    ports:
      - "5158:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      ASPNETCORE_URLS: "http://+:8080"
    depends_on:
      - userservice
      - catalogservice
      - loanservice
      - notificationservice

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: biblioteca-frontend
    restart: unless-stopped
    ports:
      - "3000:80"

volumes:
  mongo_data:
